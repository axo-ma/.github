<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Глубокий фон в стиле GitHub Dark -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    
    <!-- Неоновые линии укоренения -->
    <linearGradient id="root-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Линии, прорастающие сквозь реальность (Reality & Flow) -->
  <g filter="url(#glow)">
    <path d="M-100,250 C300,150 400,380 800,280 C1000,230 1100,320 1300,200" fill="none" stroke="url(#root-grad-1)" stroke-width="4" opacity="0.4" />
    <path d="M-50,180 C200,300 500,100 700,320 C900,440 1050,200 1250,250" fill="none" stroke="#bc8cff" stroke-width="2" opacity="0.5" />
    <path d="M-20,300 C400,320 350,150 750,200 C1000,230 1100,120 1250,150" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.3" />
    <path d="M100,420 C300,280 600,350 900,180 C1100,70 1150,250 1300,50" fill="none" stroke="url(#root-grad-1)" stroke-width="3" opacity="0.2" />
  </g>

  <!-- Точки-узлы -->
  <circle cx="400" cy="380" r="4" fill="#58a6ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="700" cy="320" r="3" fill="#bc8cff" opacity="0.6" />
  <circle cx="750" cy="200" r="5" fill="#58a6ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="900" cy="180" r="4" fill="#bc8cff" opacity="0.5" />

  <!-- Текст Axoma -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="12">AXOMA</text>
  
  <!-- Манифест -->
  <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="300" fill="#8b949e" letter-spacing="4">CALMNESS   |   DEEP ROOTING   |   FLOW</text>
</svg>
